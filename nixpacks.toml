# Fallback when Dockerfile is not used. Prefer Dockerfile on Railway for FFmpeg at runtime.
[variables]
NPM_CONFIG_PRODUCTION = ""
NPM_CONFIG_OMIT = "dev"

[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg"]
aptPkgs = ["ffmpeg"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
